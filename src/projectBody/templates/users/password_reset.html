{% extends "users/base.html" %}
{% block title %}Сброс пароля{% endblock %}

{% block content %}

<!-- Просто добавляем карточку внутри того же контейнера -->
<div class="password-reset-card">
    <h1 class="password-reset-title">Сброс пароля</h1>
    <p class="password-reset-message">
        Пожалуйста, введите ваш адрес электронной почты. Мы вышлем вам инструкции по установке нового пароля.
    </p>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="id_email">Email</label>
            <input type="email" name="email" id="id_email" required placeholder="Ваш email">
        </div>

        <button type="submit" class="btn-submit">Отправить инструкции</button>
    </form>

    <div class="login-link">
        <a href="{% url 'login' %}">Вернуться на страницу входа</a>
    </div>
</div>
{% endblock %}
